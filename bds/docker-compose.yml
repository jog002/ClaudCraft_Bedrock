services:
  bds:
    image: itzg/minecraft-bedrock-server
    container_name: claudcraft-bds
    environment:
      EULA: "TRUE"
      VERSION: "LATEST"
      SERVER_NAME: "ClaudCraft Dev"
      GAMEMODE: creative
      DIFFICULTY: peaceful
      ALLOW_CHEATS: "true"
      ONLINE_MODE: "false"
      MAX_PLAYERS: 5
      ENABLE_LAN_VISIBILITY: "true"
      DEFAULT_PLAYER_PERMISSION_LEVEL: operator
      VIEW_DISTANCE: 10
      LEVEL_NAME: "devworld"
    ports:
      - "19132:19132/udp"
    volumes:
      - ./data:/data
    stdin_open: true
    tty: true
    restart: unless-stopped

  bot:
    build:
      context: ..
      dockerfile: bds/Dockerfile.bot
    container_name: claudcraft-bot
    working_dir: /app
    environment:
      - BDS_HOST=bds
      - BDS_PORT=19132
      - RAKNET_BACKEND=raknet-native
    env_file:
      - ../.env
    depends_on:
      - bds
    stdin_open: true
    tty: true
